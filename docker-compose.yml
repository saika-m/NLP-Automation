services:
  nlp-automation-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nlp-automation-backend
    privileged: true
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - GIN_MODE=release
      - DB_PATH=/app/data/nlp-automation.db
      - UPLOAD_DIR=/app/data/uploads
      - OUTPUT_DIR=/app/data/outputs
      - TEMP_DIR=/app/data/temp
      - JWT_SECRET=your_jwt_secret_here
      - CORS_ORIGINS=http://localhost:3000,http://localhost:3001,http://nlp-automation-frontend:3000
      - MAX_SCRIPT_SIZE=10485760
      - ALLOWED_EXTENSIONS=.ps1,.sh,.py,.exe,.bat
      - COMPILATION_TIMEOUT=300
      - RATE_LIMIT_REQUESTS=100
      - RATE_LIMIT_WINDOW=3600
    env_file:
      - backend/.env
    volumes:
      - nlp-automation_data:/app/data
      - nlp-automation_uploads:/app/data/uploads
      - nlp-automation_outputs:/app/data/outputs
      - /:/host:rw
    networks:
      - nlp-automation-network
    restart: on-failure:3
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

  nlp-automation-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: nlp-automation-frontend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - REACT_APP_API_URL=http://localhost:8080
    networks:
      - nlp-automation-network
    restart: on-failure:3
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 120s
      timeout: 10s
      retries: 3
      start_period: 60s
    depends_on:
      - nlp-automation-backend

networks:
  nlp-automation-network:
    driver: bridge

volumes:
  nlp-automation_data:
    driver: local
  nlp-automation_uploads:
    driver: local
  nlp-automation_outputs:
    driver: local
